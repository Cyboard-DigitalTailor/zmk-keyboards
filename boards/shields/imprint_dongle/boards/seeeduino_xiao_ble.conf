# ZMK defaults ZMK_RGB_UNDERGLOW_EXT_POWER=y whenever RGB is enabled, and
# rgb_underglow.c then requires a zmk,ext-power-generic node — which this
# board doesn't have (our assimilator-bt does). RGB itself stays enabled
# (see seeeduino_xiao_ble.overlay); only the ext-power coupling is off.
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
