# This file generates the GitHub Actions matrix.
# For simple board + shield combinations, add them to the top level board and
# shield arrays, for more control, add individual board + shield combinations
# to the `include` property. You can also use the `cmake-args` property to
# pass flags to the build command and `artifact-name` to assign a name to
# distinguish build outputs from each other:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#   - board: nice_nano_v2
#     shield: corne_left
#     cmake-args: -DCONFIG_ZMK_USB_LOGGING=y
#     artifact-name: corne_left_with_logging
#
---
include:
  - board: assimilator-bt
    shield: imprint_left
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
  - board: assimilator-bt
    shield: imprint_right
  - board: seeeduino_xiao_ble
    shield: imprint_dongle
  - board: assimilator-bt
    shield: imprint_dongle
    artifact-name: imprint_dongle_assimilator
  - board: speller
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
  # Dactyl Manuform (letters only). Normal split: dactyl_left is the central,
  # dactyl_right the peripheral. Dongle mode: dactyl_dongle is the central and
  # both halves are peripherals — dactyl_right is already a peripheral, and
  # dactyl_left is rebuilt with ZMK_SPLIT_ROLE_CENTRAL=n (dactyl_left-peripheral).
  - board: assimilator-bt
    shield: dactyl_left
  - board: assimilator-bt
    shield: dactyl_right
  - board: assimilator-bt
    shield: dactyl_left
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: dactyl_left-peripheral
  - board: assimilator-bt
    shield: dactyl_dongle
    artifact-name: dactyl_dongle_assimilator